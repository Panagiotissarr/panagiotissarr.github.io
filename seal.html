<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; }
    body { background: black; }
    video { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <video id="v" playsinline muted src="/seal.mp4"></video>
  <script>
    const v = document.getElementById('v');
    setTimeout(() => {
      v.play().then(() => {
        v.muted = false;
      });
    }, 5000);
  </script>
</body>
</html>
