<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; }
    body { background: black; }
    video { width: 100vw; height: 100vh; display: block; }
    #overlay {
      position: fixed;
      inset: 0;
      background: black;
      cursor: pointer;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="overlay" onclick="play()"></div>
  <video id="v" playsinline src="/seal.mp4"></video>
  <script>
    function play() {
      document.getElementById('overlay').remove();
      document.getElementById('v').play();
    }
  </script>
</body>
</html>
